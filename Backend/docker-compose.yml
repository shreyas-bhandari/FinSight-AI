version: '3.8'

services:
  backend:
    build: .
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/finance_tracker
      - JWT_SECRET=development_secret_key_12345
      - JWT_EXPIRE=30d
      - NODE_ENV=development
      - ML_API_URL=http://ml-service:5001/api/ml
    depends_on:
      - mongo
    networks:
      - finance-network

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - db-data:/data/db
    networks:
      - finance-network

  # Mock structure for ML Service (Python logic would go here in actual implementation)
  ml-service:
    image: python:3.9-slim
    command: >
      sh -c "echo 'Mock ML Service Running' && sleep infinity"
    ports:
      - '5001:5001'
    networks:
      - finance-network

volumes:
  db-data:

networks:
  finance-network:
    driver: bridge
